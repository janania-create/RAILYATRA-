{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo">RailYatra</div>
    <p class="auth-sub">Sign in to your account to book and manage tickets</p>

    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p>Enter your credentials to continue</p>

      <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="yourname@email.com" required autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;color:var(--gray);font-size:0.9rem;font-weight:400;letter-spacing:normal;text-transform:none;">
            <input type="checkbox" style="width:auto;"> Remember me
          </label>
          <a href="#" style="color:var(--gold);font-size:0.9rem;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-gold btn-full">Sign In</button>
      </form>

      <div class="auth-switch" style="margin-top:20px;">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
